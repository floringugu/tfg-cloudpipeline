apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tfg-cloudpipeline
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: >-
      user=floringugu/user-service,order=floringugu/order-service
    argocd-image-updater.argoproj.io/user.update-strategy: newest-build
    argocd-image-updater.argoproj.io/order.update-strategy: newest-build
    argocd-image-updater.argoproj.io/user.allow-tags: "regexp:^[a-f0-9]{40}$"
    argocd-image-updater.argoproj.io/order.allow-tags: "regexp:^[a-f0-9]{40}$"
    argocd-image-updater.argoproj.io/user.kustomize.image-name: floringugu/user-service
    argocd-image-updater.argoproj.io/order.kustomize.image-name: floringugu/order-service
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/floringugu/tfg-cloudpipeline
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
